services:
  backend:
    build:
      context: ../../backend
      dockerfile: src/Dockerfile
      target: development

    container_name: django_backend_dev

    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "

    env_file:
      - ../../backend/src/.env.dev

    volumes:
      - ../../backend/src:/app

    ports:
      - "8000:8000"